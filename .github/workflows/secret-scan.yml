name: Secret Scan

# Scans the working tree AND the full git history for committed credentials
# using two independent engines (gitleaks + TruffleHog). Runs on every push and
# PR, on a weekly schedule (catches secrets that new detector rules learn to
# find after the fact), and on demand.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so past commits are scanned too

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "true"
          # gitleaks-action is free for public repositories; no license needed.

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan full git history
        # --results=verified,unknown reports live/uncertain findings but not
        # ones TruffleHog actively verified as revoked. --fail exits non-zero on
        # any finding so the job goes red. --no-update pins to the installed
        # version instead of self-updating mid-run.
        run: trufflehog git file://. --results=verified,unknown --fail --no-update
