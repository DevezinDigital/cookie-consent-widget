name: Secret Scan

# Scans the working tree AND the full git history for committed credentials
# using two independent engines (gitleaks + TruffleHog). Runs on every push and
# PR, on a weekly schedule (catches secrets that new detector rules learn to
# find after the fact), and on demand.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so past commits are scanned too

      # Run the open-source gitleaks binary directly. The gitleaks-action
      # wrapper requires a paid license key for organization-owned repos; the
      # binary (MIT-licensed) has no such restriction.
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        # `gitleaks git` walks the entire commit history; it auto-loads
        # .gitleaks.toml (allowlist for documented placeholders) and exits
        # non-zero on any finding. --redact keeps secret values out of logs.
        run: gitleaks git . --config .gitleaks.toml --redact --no-banner

  trufflehog:
    name: trufflehog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install TruffleHog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Scan full git history
        # --results=verified fails only on secrets TruffleHog actively confirms
        # are live, so documented placeholders (which never verify) don't break
        # CI. Pattern-based coverage for unreachable-but-real secrets is handled
        # by the gitleaks job above. --fail exits non-zero on a finding;
        # --no-update pins to the installed version instead of self-updating.
        run: trufflehog git file://. --results=verified --fail --no-update
